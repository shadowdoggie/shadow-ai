name: Auto-close pull requests

# Shadow AI does not accept pull requests (see CONTRIBUTING.md). Any PR opened against
# this repository is politely closed automatically. pull_request_target runs with the
# base repo's token so it can also close PRs from forks; we never check out PR code.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const message = [
              "Thanks for your interest in Shadow AI! 🙏",
              "",
              "This is a personal project built and directed solely by its author, and **pull requests are not accepted** — so this PR is being closed automatically (it's not a reflection of your work).",
              "",
              "If you have a bug or idea, you're welcome to open an **Issue** (no guarantee it'll be read or actioned). If you'd like to change Shadow AI yourself, please **fork it** — it's open source under AGPL-3.0-or-later.",
              "",
              "See CONTRIBUTING.md for details."
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: message,
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: "closed",
            });
